name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            runner: macos-latest
          - platform: Windows
            runner: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Cache Homebrew downloads
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-ffmpeg-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-homebrew-ffmpeg-

      - name: Install ffmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Build macOS assets
        if: runner.os == 'macOS'
        run: ./release-macos.sh "${GITHUB_REF_NAME}"

      - name: Build Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build-windows.ps1 -Version "${env:GITHUB_REF_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reclip-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            release/*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
